name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          dependency-caching: true

      - name: Restore
        run: dotnet restore "Ink Canvas.sln"

      - name: Build
        run: |
          dotnet build "Ink Canvas.sln" -c Release -p:Platform="Any CPU" --no-restore /p:GitFlow="Github Action"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
